document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    --navy: #273166;\n    --deep-navy: #1a2247;\n    --amber: #e07a1f;\n    --amber-hover: #f18e34;\n    --sand: #f5efe4;\n    --ink: #111827;\n    --muted: #5b6472;\n    --line: #e5e7eb;\n    --mono: 'IBM Plex Mono', monospace;\n    --sans: 'Schibsted Grotesk', system-ui, sans-serif;\n  }\n  * { box-sizing: border-box; }\n  html { scroll-behavior: smooth; }\n  body { margin: 0; padding: 0; font-family: var(--sans); background: #fff; color: var(--ink); -webkit-font-smoothing: antialiased; }\n  img { max-width: 100%; }\n  a { color: inherit; }\n  .wrap { padding-left: 64px; padding-right: 64px; }\n  @keyframes avkorPulse { 0% { box-shadow: 0 0 0 0 rgba(224,122,31,0.45); } 70% { box-shadow: 0 0 0 14px rgba(224,122,31,0); } 100% { box-shadow: 0 0 0 0 rgba(224,122,31,0); } }\n  .eyebrow { font-family: var(--mono); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber); margin-bottom: 18px; }\n\n  /* NAV */\n  header.nav { position: sticky; top: 0; z-index: 100; background: var(--sand); display: flex; align-items: center; justify-content: space-between; padding: 22px 64px; border-bottom: 1px solid var(--line); }\n  header.nav img.logo { height: 30px; display: block; }\n  header.nav nav { display: flex; align-items: center; gap: 40px; }\n  header.nav nav a.link { font-size: 15px; text-decoration: none; font-weight: 500; color: var(--navy); }\n  header.nav nav a.cta { font-size: 14px; color: #fff; background: var(--navy); text-decoration: none; font-weight: 600; padding: 11px 20px; border-radius: 6px; }\n  header.nav nav a.cta:hover { background: var(--deep-navy); }\n  .burger { display: none; flex-direction: column; justify-content: space-between; width: 24px; height: 17px; background: none; border: none; cursor: pointer; padding: 0; }\n  .burger span { display: block; width: 100%; height: 2px; background: var(--navy); }\n  .mobile-menu { display: none; }\n\n  /* HERO */\n  section.hero { background: var(--sand); padding: 96px 64px 104px; }\n  section.hero .grid { display: grid; grid-template-columns: 1.35fr 1fr; gap: 72px; align-items: end; }\n  section.hero h1 { font-size: 92px; line-height: 0.98; font-weight: 700; letter-spacing: -0.03em; color: var(--deep-navy); margin: 0; }\n  section.hero h1 .dot { color: var(--amber); }\n  section.hero .lede { font-size: 20px; line-height: 1.5; color: var(--navy); margin: 0; font-weight: 500; }\n  section.hero .sub { font-size: 15px; line-height: 1.6; color: var(--muted); margin: 18px 0 0; }\n  .rule-amber { width: 44px; height: 2px; background: var(--amber); margin-bottom: 22px; }\n  a.hero-cta { display: none; }\n\n  /* WHO WE ARE */\n  section.who { background: #fff; padding: 100px 64px; border-top: 1px solid var(--line); }\n  section.who .grid { display: grid; grid-template-columns: 300px 1fr; gap: 72px; }\n  section.who h2 { font-size: 34px; line-height: 1.12; font-weight: 700; letter-spacing: -0.02em; color: var(--deep-navy); margin: 0; }\n  section.who p.lead { font-size: 19px; line-height: 1.55; color: var(--ink); margin: 0 0 20px; max-width: 720px; }\n  section.who p.sub { font-size: 16px; line-height: 1.6; color: var(--muted); margin: 0; max-width: 720px; }\n  .who-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; margin-top: 56px; border-top: 1px solid var(--line); }\n  .who-cards .card { padding: 32px 28px 8px 0; border-right: 1px solid var(--line); }\n  .who-cards .card .k { font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em; color: var(--navy); margin-bottom: 14px; }\n  .who-cards .card p { font-size: 15px; line-height: 1.5; color: var(--muted); margin: 0; }\n\n  /* WHY AVKOR */\n  section.why { background: var(--deep-navy); padding: 100px 64px; color: #fff; }\n  section.why .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 60px; }\n  section.why h2 { font-size: 40px; line-height: 1.08; font-weight: 700; letter-spacing: -0.025em; margin: 0; max-width: 640px; }\n  .why-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }\n  .why-cards .card { border-top: 2px solid var(--amber); padding-top: 26px; }\n  .why-cards .card .n { font-family: var(--mono); font-size: 13px; color: rgba(245,239,228,0.55); margin-bottom: 20px; }\n  .why-cards .card h3 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 14px; color: #fff; }\n  .why-cards .card p { font-size: 15px; line-height: 1.6; color: rgba(245,239,228,0.72); margin: 0; }\n\n  /* WHERE WE ARE */\n  section.where { background: #fff; padding: 100px 64px; }\n  section.where .intro { display: grid; grid-template-columns: 300px 1fr; gap: 72px; margin-bottom: 56px; }\n  section.where h2 { font-size: 34px; line-height: 1.12; font-weight: 700; letter-spacing: -0.02em; color: var(--deep-navy); margin: 0; }\n  section.where .intro p { font-size: 17px; line-height: 1.55; color: var(--muted); margin: 0; max-width: 640px; align-self: flex-end; }\n  .map-grid { display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr); gap: 48px; align-items: stretch; }\n  .map-panel { position: relative; width: 100%; min-width: 0; max-width: 100%; aspect-ratio: 2 / 1; background: var(--deep-navy); border-radius: 10px; overflow: hidden; }\n  .map-panel img.world { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; }\n  .map-grid-overlay { position: absolute; inset: 0; background-image: linear-gradient(rgba(245,239,228,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(245,239,228,0.06) 1px, transparent 1px); background-size: 46px 46px; }\n  .pin { position: absolute; transform: translate(-50%,-50%); }\n  .pin .dot-open { border-radius: 50%; border: 2px solid rgba(245,239,228,0.7); background: transparent; }\n  .pin .dot-hq { border-radius: 50%; background: var(--amber); animation: avkorPulse 2.6s infinite; }\n  .pin .dot-office { border-radius: 2Fdiv>\n  <div class=\"grid\">\n    <div>\n      <h1>Engineering,<br>delivered<span class=\"dot\">.<\u002Fspan><\u002Fh1>\n    <\u002Fdiv>\n    <div>\n      <div class=\"rule-amber\"><\u002Fdiv>\n      <p class=\"lede\">A specialist semiconductor engineering practice. Small, senior, manufacturing-independent.<\u002Fp>\n      <p class=\"sub\">Porto HQ. Tainan office opening 2026, close to the ecosystem we already serve.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <a class=\"hero-cta\" href=\"#contact\">Start the conversation<\u002Fa>\n<\u002Fsection>\n\n<section class=\"who\" id=\"who\" data-screen-label=\"Who we are\">\n  <div class=\"grid\">\n    <div>\n      <div class=\"eyebrow\">Who we are<\u002Fdiv>\n      <h2>A specialist practice — for the complex work.<\u002Fh2>\n    <\u002Fdiv>\n    <div>\n      <p class=\"lead\">Avkor is an independent semiconductor engineering services and consulting firm. We work on the complex product and process problems high-tech companies acting as an extension of your technical team, not as a detached vendor.<\u002Fp>\n      <p class=\"sub\">We are small on purpose. Every engagement is led by a principal engineer; every deliverable is signed off by a named author.<\u002Fp>\n\n      <div class=\"who-cards\">\n        <div class=\"card\">\n          <div class=\"k\">SPECIALIST<\u002Fdiv>\n          <p>Focused on semiconductor process and product, with connections extending into other sectors and activities.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"k\">INDEPENDENT<\u002Fdiv>\n          <p>Able to investigate and act on problems with little or no support from the customer.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"k\">EMBEDDED<\u002Fdiv>\n          <p>We work inside your programme, on your tools, in your timezone — without surprises.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"why\" id=\"why\" data-screen-label=\"Why Avkor\">\n  <div class=\"head\">\n    <h2>Where Avkor is strongest.<\u002Fh2>\n    <div class=\"eyebrow\" style=\"margin-bottom:0;\">Why Avkor<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"why-cards\">\n    <div class=\"card\">\n      <div class=\"n\">01<\u002Fdiv>\n      <h3>Manufacturing-independent<\u002Fh3>\n      <p>No factory, no parts catalogue, no supplier commissions. The structure customers need for second-author review and supplier-quality work without conflict.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"n\">02<\u002Fdiv>\n      <h3>A principal on every job<\u002Fh3>\n      <p>A principal engineer is always part of your project — the person you meet is the person who runs the work and signs every deliverable as named author.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"n\">03<\u002Fdiv>\n      <h3>Cross-discipline integration<\u002Fh3>\n      <p>One Avkor principal owns the full programme spine — PLM → industrialisation → TPD → supplier quality → reliability.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"where\" id=\"where\" data-screen-label=\"Where we are\">\n  <div class=\"intro\">\n    <div>\n      <div class=\"eyebrow\">Where we are<\u002Fdiv>\n      <h2>Porto and Tainan. One engineering practice.<\u002Fh2>\n    <\u002Fdiv>\n    <p>Porto is the engineering anchor — principals, legal entity, partner network. <br>Tainan brings us into your timezone, your ecosystem, your engineering cadence.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"map-grid\">\n    <div class=\"map-panel\">\n      <img class=\"world\" src=\"9e989ec9-2193-49ea-9f4a-b99c5f805ad1\" alt=\"\">\n      <div class=\"map-grid-overlay\"><\u002Fdiv>\n      <div class=\"pin\" style=\"left:16.1%;top:29.2%;\">\n        <div class=\"dot-open\" style=\"width:10px;height:10px;\"><\u002Fdiv>\n        <div class=\"label\">California<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pi
